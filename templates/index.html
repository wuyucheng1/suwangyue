<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="{{ url_for('static', filename='jquery.min.js') }}"></script>
    <!-- <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script> -->
    <title>十日终焉 朔望月</title>
    <script>
        var idc="{{id}}";
        var source=new EventSource("/api/stream/"+idc)
        source.addEventListener('addplayer',(data)=>{
            console.log(data)
            data=JSON.parse(data['data'])
            let id=data['id']
            let name=data['name']
            if(idc==id)return;
            let str='<div class="player" id="'+id+'"><div class="player-name">'+name+'</div><div class="card-group"><div class="card" id="b"></div><div class="card" id="d"></div></div></div>'
            console.log(str)
            $(".top-players").append(str)
        })
        source.addEventListener('minpai',(data)=>{
            data=JSON.parse(data['data'])
            //minpai('public',data['public'])
            for (let id in data) {
                console.log(id,data[id])
                minpai(id,data[id])
            }
        })
        source.addEventListener('kaipai',(data)=>{
            data=JSON.parse(data['data'])
            //minpai('public',data['public'])
            for (let id in data) {
                console.log(id,data[id])
                kaipai(id,data[id])
            }
        })
        source.addEventListener('grj',(data)=>{
            data=JSON.parse(data['data'])
            console.log(data)
            if(data=='start'){
                $('.buttons').show()
            }else if(data=='end'){
                $('.buttons').hide()
            }else if(data=='dao'){
                alert("道不够")
            }
        })
        source.addEventListener('guanbo',(data)=>{
            data=JSON.parse(data['data'])
            alert(data)
        })
        $(window).unload(function(){
            source.close()
        })
        var a=0
        function g(){
            $.get('/api/grj',{'id':idc,'cho':'g'})
        }
        function r(){
            $.get('/api/grj',{'id':idc,'cho':'r'})
        }
        function j(){
            let number=prompt("要加注多少道？")
            $.get('/api/grj',{'id':idc,'cho':'j','number':number})
        }
        source.addEventListener("anpai",()=>{
            anpai(idc)
        })
        function anpai(id){
            $.get('/api/fapai',{'id':idc},(data)=>{
                data=JSON.parse(data)
                $('#an').append('<div class="card-name">'+data['name']+'</div>')
                $('#an').append('<div class="card-lunar">'+data['time']+'</div>')

            })
        }
        function minpai(id,pai){
            if(id==idc){
                $('#min').append('<div class="card-name">'+pai['name']+'</div>')
                $('#min').append('<div class="card-lunar">'+pai['time']+'</div>')
            }else if(id!="public"){
                $('#'+id+' #b').append('<div class="card-name">'+pai['name']+'</div>')
                $('#'+id+' #b').append('<div class="card-lunar">'+pai['time']+'</div>')
            }else{
                $('#'+id).append('<div class="card-name">'+pai['name']+'</div>')
                $('#'+id).append('<div class="card-lunar">'+pai['time']+'</div>')
            }
        }

        function kaipai(id,pai){
            if(id!=idc){
                $('#'+id+' #d').append('<div class="card-name">'+pai['name']+'</div>')
                $('#'+id+' #d').append('<div class="card-lunar">'+pai['time']+'</div>')
            }
        }
        function sendname(){
            if($("#name").val()!=""){
                $.get("/api/name",{"name":$("#name").val(),"id":idc},()=>{
                    $('#start').hide()
                    $('.buttons').hide()
                })
            }
        }

    </script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <div style="width: 100%;height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;" id="start">
        <p>你的名字 :<input type="text" id="name"></p>
        <button onclick="sendname()">提交</button>
    </div>
    <div class="game-container">
        <div class="top-players">
            
        </div>
        <div class="center-circle">
            <div class="card" id="public">

            </div>
        </div>

        <div class="bottom-area">
            <div class="card-group">
                <div class="bottom-card" id="min">
                    
                </div>
                <div class="bottom-card" id="an">
                    
                </div>
            </div>
            <div class="buttons">
                <button id="g" onclick="g()">跟注</button>
                <button id="j" onclick="j()">加注</button>
                <button id="r" onclick="r()">认输</button>
            </div>
        </div>
    </div>
    <button class="corner-btn">菜单</button>
</body>
</html>
